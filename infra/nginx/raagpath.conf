# ═══════════════════════════════════════════════════════════════════
#  RaagPath — Nginx reverse proxy config
#
#  Install on EC2 Amazon Linux 2023:
#    sudo yum install nginx -y
#    sudo cp raagpath.conf /etc/nginx/conf.d/raagpath.conf
#    sudo nginx -t && sudo systemctl reload nginx
#
#  TLS (Day 5):
#    sudo yum install certbot python3-certbot-nginx -y
#    sudo certbot --nginx -d yourdomain.com
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;          # replace with your domain on Day 5

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # Proxy all traffic to Spring Boot
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Larger body for audio uploads (Day 5 S3 asset uploads)
    client_max_body_size 20M;
}
