# ═══════════════════════════════════════════════════════════════════
#  RaagPath — CI/CD Pipeline
#
#  Trigger : push to main
#  Steps   : Build → Docker build → ECR Public push → SSH deploy
#
#  Secrets required (GitHub → Settings → Secrets → Actions):
#    AWS_ROLE_ARN          — OIDC role ARN (no long-lived keys)
#    EC2_HOST              — EC2 public IP or DNS
#    EC2_USER              — ec2-user
#    EC2_SSH_KEY           — PEM private key (contents, not path)
#    DB_PASSWORD           — RDS password
#    JWT_SECRET            — 64-char random string
#    SPRING_DATASOURCE_URL — jdbc:postgresql://...
# ═══════════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  ECR_REGISTRY: public.ecr.aws/v8m0u4l8
  IMAGE_NAME:   raagpath
  AWS_REGION:   us-east-1   # ECR Public is always us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials via OIDC ────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}

      # ── 3. Log in to ECR Public ──────────────────────────────────────────────
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # ── 4. Build & push Docker image ─────────────────────────────────────────
      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $ECR_REGISTRY/$IMAGE_NAME:latest \
            .
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest

      # ── 5. Deploy to EC2 via SSH ─────────────────────────────────────────────
      - name: Deploy to EC2
        env:
          IMAGE_TAG:             ${{ github.sha }}
          DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        run: |
          # Write SSH key to temp file
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/raagpath-key.pem
          chmod 600 /tmp/raagpath-key.pem

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

          # ── Create app directory on EC2 ───────────────────────────────────
          $SSH_CMD "mkdir -p /home/ec2-user/raagpath"

          # ── Write .env file via SCP (avoids heredoc nesting issues) ───────
          # Variables are expanded here on the GitHub runner — never touch EC2 env
          cat > /tmp/raagpath.env << EOF
SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
DB_USERNAME=raagpath
DB_PASSWORD=${DB_PASSWORD}
JWT_SECRET=${JWT_SECRET}
EOF
          scp -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem \
            /tmp/raagpath.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/raagpath/.env

          # ── Pull image (ECR Public = no login needed) and restart ─────────
          $SSH_CMD "
            set -e
            docker pull $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
            docker tag  $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
                        $ECR_REGISTRY/$IMAGE_NAME:latest
            cd /home/ec2-user/raagpath
            docker compose up -d
            echo 'Waiting for app to be healthy...'
            sleep 20
            curl -sf http://localhost:8080/api/health || exit 1
            echo 'Deployment successful!'
          "

          rm -f /tmp/raagpath-key.pem /tmp/raagpath.env
