# ═══════════════════════════════════════════════════════════════════
#  RaagPath — CI/CD Pipeline
#
#  Trigger : push to main
#  Steps   : Build → Docker build → ECR Public push → SSH deploy
#
#  Secrets required (GitHub → Settings → Secrets → Actions):
#    AWS_ROLE_ARN          — OIDC role ARN (no long-lived keys)
#    EC2_HOST              — EC2 public IP or DNS
#    EC2_USER              — ec2-user
#    EC2_SSH_KEY           — PEM private key (contents, not path)
#    DB_PASSWORD           — RDS password
#    JWT_SECRET            — 64-char random string
#    SPRING_DATASOURCE_URL — jdbc:postgresql://...
# ═══════════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  ECR_REGISTRY: public.ecr.aws/v8m0u4l8
  IMAGE_NAME:   raagpath
  AWS_REGION:   us-east-1   # ECR Public is always us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials via OIDC ────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}

      # ── 3. Log in to ECR Public ──────────────────────────────────────────────
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # ── 4. Build & push Docker image ─────────────────────────────────────────
      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $ECR_REGISTRY/$IMAGE_NAME:latest \
            .
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest

      # ── 5. Deploy to EC2 via SSH ─────────────────────────────────────────────
      - name: Deploy to EC2
        env:
          IMAGE_TAG:             ${{ github.sha }}
          DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        run: |
          # Write SSH key to temp file
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/raagpath-key.pem
          chmod 600 /tmp/raagpath-key.pem

          # ── Temporarily open SSH from this runner's IP ────────────────────
          # The EC2 SG restricts port 22 to a specific CIDR; dynamically add
          # the current runner IP so SSH can connect, then revoke on exit.
          SG_ID="sg-0d531e62149120f24"
          EC2_REGION="ap-south-1"
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" --region "$EC2_REGION" 2>/dev/null || true

          # Revoke runner's SSH access + delete temp files on any exit
          trap "aws ec2 revoke-security-group-ingress \
            --group-id \"$SG_ID\" --protocol tcp --port 22 \
            --cidr \"${RUNNER_IP}/32\" --region \"$EC2_REGION\" \
            > /dev/null 2>&1 || true; \
            rm -f /tmp/raagpath-key.pem /tmp/raagpath.env" EXIT

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

          # ── Create app directory on EC2 ───────────────────────────────────
          $SSH_CMD "mkdir -p /home/ec2-user/raagpath"

          # ── Write .env file via SCP ───────────────────────────────────────
          {
            echo "SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}"
            echo "DB_USERNAME=raagpath"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "JWT_SECRET=${JWT_SECRET}"
          } > /tmp/raagpath.env

          # SCP .env, docker-compose.yml, and nginx config to EC2
          scp -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem \
            /tmp/raagpath.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/raagpath/.env
          scp -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem \
            docker-compose.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/raagpath/docker-compose.yml
          scp -o StrictHostKeyChecking=no -i /tmp/raagpath-key.pem \
            infra/nginx/raagpath.conf \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/raagpath-nginx.conf

          # ── Pull image (ECR Public = no login needed) and restart ─────────
          $SSH_CMD "
            set -e
            docker pull $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
            docker tag  $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG $ECR_REGISTRY/$IMAGE_NAME:latest
            cd /home/ec2-user/raagpath

            # --force-recreate ensures new image is used even if tag name unchanged
            docker compose up -d --force-recreate --remove-orphans

            # ── Nginx + firewalld setup (idempotent, non-fatal) ──────────────
            sudo dnf install -y nginx           > /dev/null 2>&1 || true
            sudo cp /tmp/raagpath-nginx.conf /etc/nginx/conf.d/raagpath.conf 2>/dev/null || true
            sudo systemctl enable nginx                                        2>/dev/null || true
            sudo systemctl start  nginx         2>/dev/null || \
              sudo systemctl reload nginx        2>/dev/null || true
            sudo firewall-cmd --permanent --add-service=http  > /dev/null 2>&1 || true
            sudo firewall-cmd --permanent --add-port=8080/tcp > /dev/null 2>&1 || true
            sudo firewall-cmd --reload                        > /dev/null 2>&1 || true

            # Retry health check for up to 60s (cold start on t2.micro can be slow)
            echo 'Waiting for app to be healthy...'
            for i in \$(seq 1 12); do
              curl -sf http://localhost:8080/api/health && echo 'Deployment successful!' && exit 0
              echo \"Attempt \$i/12 — retrying in 5s...\"
              sleep 5
            done
            echo 'Health check timed out after 60s' && exit 1
          "
          # trap EXIT handles cleanup
